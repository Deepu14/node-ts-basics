name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npx eslint src/**/*.ts 2>&1) || ESLINT_EXIT=$?

          if [ -z "$ESLINT_EXIT" ]; then
            STATUS="✅ No ESLint issues found."
          else
            STATUS=$(printf '❌ ESLint issues found:\n```\n%s\n```' "$OUTPUT")
          fi

          {
            echo "## ESLint Report"
            echo ""
            echo "**Files checked:**"
            find src -name "*.ts" | while read f; do echo "- \`$f\`"; done
            echo ""
            echo "$STATUS"
          } | tee /tmp/eslint-report.md >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/eslint-report.md
          fi

          exit ${ESLINT_EXIT:-0}

      - name: Run tests
        run: npx tsx src/tests/userService.test.ts > tap-output.txt || echo "TEST_FAILED=1" >> $GITHUB_ENV

      - name: Convert TAP to JUnit
        if: always()
        run: npx tap-junit --input tap-output.txt --output test-results.xml --name "User Service Tests"

      - name: Post test results as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PASS_ROWS=""
          FAIL_ROWS=""
          PASS_COUNT=0
          FAIL_COUNT=0
          current_test=""
          current_status="pass"

          while IFS= read -r line; do
            if [[ "$line" == "# "* ]]; then
              test_name="${line:2}"
              if [[ "$test_name" =~ ^(tests|pass|fail)[[:space:]][0-9]+$ ]]; then
                continue
              fi
              if [ -n "$current_test" ]; then
                if [ "$current_status" = "pass" ]; then
                  PASS_COUNT=$((PASS_COUNT + 1))
                  PASS_ROWS+="| $PASS_COUNT | $current_test |\n"
                else
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  FAIL_ROWS+="| $FAIL_COUNT | $current_test |\n"
                fi
              fi
              current_test="$test_name"
              current_status="pass"
            elif [[ "$line" == "not ok "* ]]; then
              current_status="fail"
            fi
          done < tap-output.txt

          if [ -n "$current_test" ]; then
            if [ "$current_status" = "pass" ]; then
              PASS_COUNT=$((PASS_COUNT + 1))
              PASS_ROWS+="| $PASS_COUNT | $current_test |\n"
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              FAIL_ROWS+="| $FAIL_COUNT | $current_test |\n"
            fi
          fi

          TOTAL=$((PASS_COUNT + FAIL_COUNT))

          if [ "$FAIL_COUNT" -eq 0 ]; then
            RESULT="✅ All tests passed"
          else
            RESULT="❌ Some tests failed"
          fi

          {
            echo "## 🧪 Test Report"
            echo ""
            echo "$RESULT"
            echo ""
            echo "| Total | ✅ Passed | ❌ Failed |"
            echo "|-------|-----------|-----------|"
            echo "| $TOTAL | $PASS_COUNT | $FAIL_COUNT |"

            if [ "$FAIL_COUNT" -gt 0 ]; then
              echo ""
              echo "<details open>"
              echo "<summary>❌ Failed Tests ($FAIL_COUNT)</summary>"
              echo ""
              echo "| # | Test |"
              echo "|---|------|"
              printf "$FAIL_ROWS"
              echo ""
              echo "</details>"
            fi

            echo ""
            echo "<details>"
            echo "<summary>✅ Passed Tests ($PASS_COUNT)</summary>"
            echo ""
            echo "| # | Test |"
            echo "|---|------|"
            printf "$PASS_ROWS"
            echo ""
            echo "</details>"
          } > /tmp/test-report.md

          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/test-report.md

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: test-results.xml/*.xml
          fail_on_failure: true

      - name: Fail if tests failed
        if: env.TEST_FAILED == '1'
        run: exit 1
